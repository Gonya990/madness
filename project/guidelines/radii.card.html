<!-- @dsCard group="Spacing" viewport="700x180" name="Радиусы" subtitle="Мягкие, без сплошных пилюль. Карточки на lg/xl." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{ margin:0; padding:24px; background:var(--color-bg); color:var(--color-text); font-family:var(--font-sans); }
  .grid{ display:flex; gap:16px; flex-wrap:wrap; }
  .item{ display:flex; flex-direction:column; gap:8px; align-items:center; }
  .box{ width:74px; height:62px; background:var(--color-surface); border:1.5px solid var(--coral-400); }
  .lbl{ font-family:var(--font-mono); font-size:10.5px; color:var(--color-text-secondary); text-align:center; }
  .lbl b{ display:block; color:var(--color-text); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="lbl"><b>xs</b>4px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="lbl"><b>sm</b>6px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="lbl"><b>md</b>8px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="lbl"><b>lg</b>12px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="lbl"><b>xl</b>16px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><span class="lbl"><b>2xl</b>22px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-3xl)"></div><span class="lbl"><b>3xl</b>28px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-full); width:62px"></div><span class="lbl"><b>full</b>9999</span></div>
  </div>
</body>
</html>
