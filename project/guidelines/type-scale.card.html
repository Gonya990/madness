<!-- @dsCard group="Type" viewport="700x340" name="Шкала шрифтов" subtitle="2xs → 6xl, коэффициент 1.2–1.25" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{ margin:0; padding:22px 24px; background:var(--color-bg); color:var(--color-text); font-family:var(--font-sans); }
  .r{ display:flex; align-items:baseline; gap:16px; padding:5px 0; border-bottom:1px solid var(--color-border-subtle); }
  .r:last-child{ border-bottom:0; }
  .t{ font-family:var(--font-display); font-weight:600; letter-spacing:-0.02em; color:var(--color-text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta{ margin-left:auto; font-family:var(--font-mono); font-size:11px; color:var(--color-text-muted); white-space:nowrap; }
</style>
</head>
<body>
  <div class="r"><span class="t" style="font-size:var(--text-6xl)">Деплой</span><span class="meta">6xl · 60</span></div>
  <div class="r"><span class="t" style="font-size:var(--text-5xl)">Деплой быстрее</span><span class="meta">5xl · 48</span></div>
  <div class="r"><span class="t" style="font-size:var(--text-4xl)">Деплой быстрее сегодня</span><span class="meta">4xl · 38</span></div>
  <div class="r"><span class="t" style="font-size:var(--text-3xl)">Пиши, запускай, деплой</span><span class="meta">3xl · 30</span></div>
  <div class="r"><span class="t" style="font-size:var(--text-2xl)">Заголовок раздела</span><span class="meta">2xl · 24</span></div>
  <div class="r"><span class="t" style="font-size:var(--text-xl)">Заголовок карточки</span><span class="meta">xl · 20</span></div>
  <div class="r"><span class="t" style="font-size:var(--text-lg); font-family:var(--font-sans); font-weight:500">Вводный абзац</span><span class="meta">lg · 18</span></div>
  <div class="r"><span class="t" style="font-size:var(--text-base); font-family:var(--font-sans); font-weight:400">Текст — база 15px</span><span class="meta">base · 15</span></div>
  <div class="r"><span class="t" style="font-size:var(--text-sm); font-family:var(--font-sans); font-weight:400">Вторичный / подписи</span><span class="meta">sm · 13</span></div>
  <div class="r"><span class="t" style="font-size:var(--text-xs); font-family:var(--font-sans); font-weight:500">Подписи, мета</span><span class="meta">xs · 12</span></div>
</body>
</html>
