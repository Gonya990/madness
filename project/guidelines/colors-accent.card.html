<!-- @dsCard group="Colors" viewport="700x250" name="Акцент и поддержка" subtitle="Янтарь (акцент) и синий (ссылки / инфо)" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{ margin:0; padding:22px; background:var(--color-bg); color:var(--color-text); font-family:var(--font-sans); display:flex; flex-direction:column; gap:18px; }
  .grp h4{ margin:0 0 8px; font-family:var(--font-mono); font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--color-text-muted); }
  .scale{ display:flex; gap:6px; }
  .sw{ flex:1; display:flex; flex-direction:column; gap:5px; min-width:0; }
  .chip{ height:46px; border-radius:8px; border:1px solid rgba(40,26,12,.07); }
  .sw b{ font-size:11px; font-weight:600; }
  .sw code{ font-family:var(--font-mono); font-size:9.5px; color:var(--color-text-muted); }
</style>
</head>
<body>
  <div class="grp">
    <h4>Янтарь · акцент</h4>
    <div class="scale">
      <div class="sw"><div class="chip" style="background:var(--amber-50)"></div><b>50</b><code>#FDF4E3</code></div>
      <div class="sw"><div class="chip" style="background:var(--amber-100)"></div><b>100</b><code>#FAE6C2</code></div>
      <div class="sw"><div class="chip" style="background:var(--amber-200)"></div><b>200</b><code>#F3CE8C</code></div>
      <div class="sw"><div class="chip" style="background:var(--amber-300)"></div><b>300</b><code>#ECB75C</code></div>
      <div class="sw"><div class="chip" style="background:var(--amber-400)"></div><b>400</b><code>#E8A23D</code></div>
      <div class="sw"><div class="chip" style="background:var(--amber-500)"></div><b>500</b><code>#D2871F</code></div>
      <div class="sw"><div class="chip" style="background:var(--amber-600)"></div><b>600</b><code>#AC6B17</code></div>
      <div class="sw"><div class="chip" style="background:var(--amber-700)"></div><b>700</b><code>#855213</code></div>
    </div>
  </div>
  <div class="grp">
    <h4>Синий · ссылки / инфо</h4>
    <div class="scale">
      <div class="sw"><div class="chip" style="background:var(--blue-50)"></div><b>50</b><code>#ECF2FC</code></div>
      <div class="sw"><div class="chip" style="background:var(--blue-100)"></div><b>100</b><code>#D2E0F7</code></div>
      <div class="sw"><div class="chip" style="background:var(--blue-200)"></div><b>200</b><code>#A6C3ED</code></div>
      <div class="sw"><div class="chip" style="background:var(--blue-300)"></div><b>300</b><code>#6E9CDD</code></div>
      <div class="sw"><div class="chip" style="background:var(--blue-400)"></div><b>400</b><code>#4A86D6</code></div>
      <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><b>500</b><code>#2C6FCB</code></div>
      <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><b>600</b><code>#2056A4</code></div>
      <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><b>700</b><code>#18437F</code></div>
    </div>
  </div>
</body>
</html>
