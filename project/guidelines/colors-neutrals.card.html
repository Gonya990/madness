<!-- @dsCard group="Colors" viewport="700x150" name="Тёплые нейтральные — Песок" subtitle="Фоны, текст и границы" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{ margin:0; padding:22px; background:var(--color-bg); color:var(--color-text); font-family:var(--font-sans); }
  .scale{ display:flex; gap:6px; }
  .sw{ flex:1; display:flex; flex-direction:column; gap:5px; min-width:0; }
  .chip{ height:54px; border-radius:8px; border:1px solid rgba(40,26,12,.08); }
  .sw b{ font-size:11px; font-weight:600; }
  .sw code{ font-family:var(--font-mono); font-size:9px; color:var(--color-text-muted); }
</style>
</head>
<body>
  <div class="scale">
    <div class="sw"><div class="chip" style="background:var(--sand-50)"></div><b>50</b><code>#FBF8F2</code></div>
    <div class="sw"><div class="chip" style="background:var(--sand-100)"></div><b>100</b><code>#F4EEE3</code></div>
    <div class="sw"><div class="chip" style="background:var(--sand-200)"></div><b>200</b><code>#E9E0CF</code></div>
    <div class="sw"><div class="chip" style="background:var(--sand-300)"></div><b>300</b><code>#D8CBB2</code></div>
    <div class="sw"><div class="chip" style="background:var(--sand-400)"></div><b>400</b><code>#BCAA8C</code></div>
    <div class="sw"><div class="chip" style="background:var(--sand-500)"></div><b>500</b><code>#99876B</code></div>
    <div class="sw"><div class="chip" style="background:var(--sand-600)"></div><b>600</b><code>#75654E</code></div>
    <div class="sw"><div class="chip" style="background:var(--sand-700)"></div><b>700</b><code>#564839</code></div>
    <div class="sw"><div class="chip" style="background:var(--sand-800)"></div><b>800</b><code>#3A2F25</code></div>
    <div class="sw"><div class="chip" style="background:var(--sand-900)"></div><b>900</b><code>#261E16</code></div>
    <div class="sw"><div class="chip" style="background:var(--sand-950)"></div><b>950</b><code>#1A140E</code></div>
  </div>
</body>
</html>
