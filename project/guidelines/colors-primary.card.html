<!-- @dsCard group="Colors" viewport="700x150" name="Основной — Коралл" subtitle="Брендовый цвет. 500 — основной CTA по умолчанию." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{ margin:0; padding:22px; background:var(--color-bg); color:var(--color-text); font-family:var(--font-sans); }
  .scale{ display:flex; gap:6px; }
  .sw{ flex:1; display:flex; flex-direction:column; gap:5px; min-width:0; }
  .chip{ height:54px; border-radius:8px; border:1px solid rgba(40,26,12,.07); position:relative; }
  .chip.is-primary{ box-shadow:0 0 0 2px var(--color-bg), 0 0 0 4px var(--coral-500); }
  .sw b{ font-size:11px; font-weight:600; }
  .sw code{ font-family:var(--font-mono); font-size:9.5px; color:var(--color-text-muted); }
  .tag{ position:absolute; top:6px; left:6px; font-family:var(--font-mono); font-size:8.5px; letter-spacing:.06em; text-transform:uppercase; color:#fff; }
</style>
</head>
<body>
  <div class="scale">
    <div class="sw"><div class="chip" style="background:var(--coral-50)"></div><b>50</b><code>#FFF1EC</code></div>
    <div class="sw"><div class="chip" style="background:var(--coral-100)"></div><b>100</b><code>#FFDFD2</code></div>
    <div class="sw"><div class="chip" style="background:var(--coral-200)"></div><b>200</b><code>#FFC0AB</code></div>
    <div class="sw"><div class="chip" style="background:var(--coral-300)"></div><b>300</b><code>#FB977A</code></div>
    <div class="sw"><div class="chip" style="background:var(--coral-400)"></div><b>400</b><code>#F66E4B</code></div>
    <div class="sw"><div class="chip is-primary" style="background:var(--coral-500)"><span class="tag">основной</span></div><b>500</b><code>#F4522D</code></div>
    <div class="sw"><div class="chip" style="background:var(--coral-600)"><span class="tag">наведение</span></div><b>600</b><code>#DC4322</code></div>
    <div class="sw"><div class="chip" style="background:var(--coral-700)"></div><b>700</b><code>#B5351C</code></div>
    <div class="sw"><div class="chip" style="background:var(--coral-800)"></div><b>800</b><code>#8E2C18</code></div>
    <div class="sw"><div class="chip" style="background:var(--coral-900)"></div><b>900</b><code>#722717</code></div>
  </div>
</body>
</html>
