<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body{ margin:0; padding:24px; background:var(--color-bg); color:var(--color-text); font-family:var(--font-sans); }
  .hero{ font-family:var(--font-display); font-weight:700; font-size:var(--text-5xl); letter-spacing:-0.025em; line-height:1.02; margin:0; }
  .hero em{ font-style:normal; color:var(--color-primary); }
  .ladder{ display:flex; align-items:baseline; gap:24px; margin-top:18px; flex-wrap:wrap; }
  .ladder span{ font-family:var(--font-display); font-weight:700; letter-spacing:-0.02em; color:var(--color-text); }
  .cap{ font-family:var(--font-mono); font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--color-text-muted); margin-top:18px; }
</style>
</head>
<body>
  <h1 class="hero">Пиши. Запускай. <em>Деплой.</em></h1>
  <div class="ladder">
    <span style="font-size:var(--text-4xl)">Aa</span>
    <span style="font-size:var(--text-3xl)">Пишем вместе</span>
    <span style="font-size:var(--text-2xl); font-weight:500">Средний 500</span>
  </div>
  <div class="cap">Space Grotesk · 500 / 700 · трекинг −0.02em</div>
</body>
</html>
