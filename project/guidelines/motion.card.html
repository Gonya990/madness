<!-- @dsCard group="Spacing" viewport="700x230" name="Анимация" subtitle="Быстро и точно. Standard ease, 120–260мс." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{ margin:0; padding:24px; background:var(--color-bg); color:var(--color-text); font-family:var(--font-sans); }
  .track{ display:flex; align-items:center; gap:14px; margin-bottom:12px; }
  .name{ font-family:var(--font-mono); font-size:11px; width:118px; flex:0 0 auto; color:var(--color-text-secondary); }
  .rail{ position:relative; flex:1; height:18px; background:var(--color-surface-2); border-radius:999px; }
  .dot{ position:absolute; top:3px; left:3px; width:12px; height:12px; border-radius:50%; background:var(--coral-500); animation:slide 2.6s infinite; }
  @keyframes slide{ 0%{ left:3px } 50%{ left:calc(100% - 15px) } 100%{ left:3px } }
  .e1{ animation-timing-function:var(--ease-standard); }
  .e2{ animation-timing-function:var(--ease-out); }
  .e3{ animation-timing-function:var(--ease-spring); }
  .e4{ animation-timing-function:linear; }
  .durs{ display:flex; gap:18px; margin-top:6px; font-family:var(--font-mono); font-size:11px; color:var(--color-text-muted); }
  .durs b{ color:var(--color-text); }
</style>
</head>
<body>
  <div class="track"><span class="name">стандарт</span><span class="rail"><span class="dot e1"></span></span></div>
  <div class="track"><span class="name">out (появление)</span><span class="rail"><span class="dot e2"></span></span></div>
  <div class="track"><span class="name">spring (переключатели)</span><span class="rail"><span class="dot e3"></span></span></div>
  <div class="track"><span class="name">linear (спиннеры)</span><span class="rail"><span class="dot e4"></span></span></div>
  <div class="durs"><span><b>быстро</b> 120мс</span><span><b>база</b> 180мс</span><span><b>медленно</b> 260мс</span></div>
</body>
</html>
