<!-- @dsCard group="Spacing" viewport="700x320" name="Шкала отступов" subtitle="Базовая сетка 4px" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{ margin:0; padding:22px 24px; background:var(--color-bg); color:var(--color-text); font-family:var(--font-sans); }
  .row{ display:flex; align-items:center; gap:14px; margin-bottom:9px; }
  .name{ font-family:var(--font-mono); font-size:11px; width:96px; flex:0 0 auto; color:var(--color-text-secondary); }
  .bar{ height:14px; background:var(--coral-400); border-radius:3px; }
  .px{ font-family:var(--font-mono); font-size:10px; color:var(--color-text-muted); }
</style>
</head>
<body>
  <div class="row"><span class="name">--space-1</span><span class="bar" style="width:var(--space-1)"></span><span class="px">4px</span></div>
  <div class="row"><span class="name">--space-2</span><span class="bar" style="width:var(--space-2)"></span><span class="px">8px</span></div>
  <div class="row"><span class="name">--space-3</span><span class="bar" style="width:var(--space-3)"></span><span class="px">12px</span></div>
  <div class="row"><span class="name">--space-4</span><span class="bar" style="width:var(--space-4)"></span><span class="px">16px</span></div>
  <div class="row"><span class="name">--space-5</span><span class="bar" style="width:var(--space-5)"></span><span class="px">20px</span></div>
  <div class="row"><span class="name">--space-6</span><span class="bar" style="width:var(--space-6)"></span><span class="px">24px</span></div>
  <div class="row"><span class="name">--space-7</span><span class="bar" style="width:var(--space-7)"></span><span class="px">32px</span></div>
  <div class="row"><span class="name">--space-8</span><span class="bar" style="width:var(--space-8)"></span><span class="px">40px</span></div>
  <div class="row"><span class="name">--space-9</span><span class="bar" style="width:var(--space-9)"></span><span class="px">48px</span></div>
  <div class="row"><span class="name">--space-10</span><span class="bar" style="width:var(--space-10)"></span><span class="px">64px</span></div>
</body>
</html>
