<!-- @dsCard group="Type" viewport="700x220" name="Моно — JetBrains Mono" subtitle="Код, пути, клавиши, данные. Лигатуры выкл." -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  body{ margin:0; padding:24px; background:var(--color-bg); color:var(--color-text); font-family:var(--font-mono); }
  .line{ font-size:var(--text-xl); font-weight:500; letter-spacing:-0.01em; }
  .line .mut{ color:var(--color-text-muted); }
  .row{ display:flex; gap:22px; align-items:baseline; margin-top:18px; flex-wrap:wrap; }
  .row span{ display:flex; flex-direction:column; gap:3px; }
  .row small{ font-family:var(--font-mono); font-size:10px; color:var(--color-text-muted); }
  .glyphs{ margin-top:18px; font-size:18px; color:var(--color-text-secondary); letter-spacing:.06em; }
  .cap{ font-family:var(--font-sans); font-size:12px; color:var(--color-text-muted); margin-top:14px; }
</style>
</head>
<body>
  <div class="line"><span class="mut">$</span> uni deploy --prod</div>
  <div class="row">
    <span style="font-size:var(--text-md)">400 обычный<small>0123456789</small></span>
    <span style="font-size:var(--text-md); font-weight:500">500 средний<small>const · =&gt; · {}</small></span>
    <span style="font-size:var(--text-md); font-weight:700">700 жирный<small>ERROR · OK</small></span>
  </div>
  <div class="glyphs">0 O o · 1 l I i · {} [] () &lt;&gt; · =&gt; != === ++</div>
  <div class="cap">JetBrains Mono · чёткое различие 0/O и 1/l/I</div>
</body>
</html>
