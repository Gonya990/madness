<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.456.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body{ margin:0; padding:22px; background:var(--color-bg); color:var(--color-text); }
  .d-demo{ display:flex; flex-direction:column; gap:20px; }
  .d-row{ display:flex; flex-wrap:wrap; align-items:center; gap:12px; }
  .d-lbl{ font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--color-text-muted); margin-bottom:8px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const NS = window.UniCodeDesignSystem_7662ea;
const { Tabs, Breadcrumbs, Menu, Button, IconButton } = NS;
function Demo() {
  return (
    <div className="d-demo">
      <Breadcrumbs items={[
        { label: 'Проекты', href: '#', icon: 'folder' },
        { label: 'acme-api', href: '#' },
        { label: 'src/index.ts' },
      ]} />
      <div>
        <div className="d-lbl">Табы · линия</div>
        <Tabs defaultValue="files" items={[
          { value: 'files', label: 'Файлы', icon: 'folder' },
          { value: 'issues', label: 'Задачи', badge: 4 },
          { value: 'deploys', label: 'Деплои', icon: 'rocket' },
          { value: 'settings', label: 'Настройки', icon: 'settings' },
        ]} />
      </div>
      <div>
        <div className="d-lbl">Табы · пилюля</div>
        <Tabs variant="pill" defaultValue="preview" items={['Код', 'Превью', 'Консоль']} />
      </div>
      <div className="d-row">
        <Menu trigger={<Button variant="secondary" rightIcon="chevron-down">Аккаунт</Button>} items={[
          { type: 'heading', label: 'ada@unicode.dev' },
          { label: 'Профиль', icon: 'user' },
          { label: 'Настройки', icon: 'settings', shortcut: '⌘,' },
          { type: 'separator' },
          { label: 'Выйти', icon: 'log-out', danger: true },
        ]} />
        <Menu align="end" trigger={<IconButton icon="more-vertical" label="Ещё" variant="subtle" />} items={[
          { label: 'Переименовать', icon: 'pencil' },
          { label: 'Дублировать', icon: 'copy' },
          { type: 'separator' },
          { label: 'Удалить', icon: 'trash-2', danger: true },
        ]} />
        <span style={{ color: 'var(--color-text-muted)', fontSize: 'var(--text-sm)' }}>← кликните, чтобы открыть</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
